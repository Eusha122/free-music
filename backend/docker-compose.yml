services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: freetune
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: freetune
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freetune"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://freetune:${POSTGRES_PASSWORD}@db:5432/freetune
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JAMENDO_CLIENT_ID: ${JAMENDO_CLIENT_ID:?set JAMENDO_CLIENT_ID in .env}
      AUDIUS_APP_NAME: ${AUDIUS_APP_NAME:-FreeTuneApp}
      PORT: 3000
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

volumes:
  db_data:
